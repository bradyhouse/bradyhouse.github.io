<style>
  :root{--phos:#33ff33;--phos-dim:#1f9d1f;--cursor:#80ff80;--phos-bg:#060d06;--ink:#080c08;
    --panel:#0f160f;--panel-2:#131c13;--line:#1d2a1d;--text:#d7e6d7;--muted:#7f947f;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--ink);color:var(--text);font-family:var(--sans);display:grid;grid-template-columns:300px 1fr;grid-template-rows:auto 1fr;height:100vh;height:100dvh;overflow:hidden}
  /* header */
  header{grid-column:1/-1;background:var(--phos-bg);border-bottom:1px solid var(--line);position:relative;overflow:hidden;padding:14px 20px;font-family:var(--mono);display:flex;align-items:center;justify-content:space-between;gap:16px}
  header::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.2) 0,rgba(0,0,0,.2) 1px,transparent 1px,transparent 3px);opacity:.6}
  header h1{position:relative;color:var(--phos);font-size:15px;font-weight:700;letter-spacing:.02em;text-shadow:0 0 7px rgba(51,255,51,.5)}
  header h1 .dim{color:var(--phos-dim);font-weight:400}
  header .home{position:relative;flex:none;color:var(--phos-dim);text-decoration:none;font-size:12px;border:1px solid var(--line);border-radius:6px;padding:5px 11px;transition:.12s}
  header .home:hover{color:var(--phos);border-color:var(--phos-dim);text-shadow:0 0 6px rgba(51,255,51,.5)}
  /* sidebar */
  aside{border-right:1px solid var(--line);overflow-y:auto;padding:12px}
  .search{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);
    font-family:var(--mono);font-size:12px;padding:8px 10px;margin-bottom:10px;outline:none}
  .search:focus{border-color:var(--phos-dim)}
  .fw-header{display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;user-select:none;
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:6px 8px;margin:1px 0;border-radius:6px}
  .fw-header:hover{background:var(--panel-2);color:var(--phos)}
  .fw-header .chev{display:inline-block;font-size:8px;transition:transform .15s;color:var(--phos-dim)}
  .fw-group.open>.fw-header{color:var(--phos-dim)}
  .fw-group.open>.fw-header .chev{transform:rotate(90deg)}
  .fw-header .cnt{color:var(--muted);font-size:10px}
  .fw-items{display:none;margin:0 0 6px 8px}
  .fw-group.open>.fw-items{display:block}
  .item{display:flex;gap:9px;align-items:center;padding:6px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:.12s}
  .item:hover{background:var(--panel-2);border-color:var(--line)}
  .item.active{background:var(--panel-2);border-color:var(--phos-dim)}
  .item .thumb{width:44px;height:30px;border-radius:4px;background:#05080c center/cover no-repeat;border:1px solid var(--line);flex:none}
  .item .lbl{font-size:12.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item.active .lbl{color:var(--phos)}
  /* stage */
  main{position:relative;display:flex;flex-direction:column;min-width:0}
  .bar{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px;color:var(--muted)}
  .bar .cur{color:var(--phos)}
  .toggle{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--phos-dim);background:transparent;border:1px solid var(--line);border-radius:6px;padding:4px 9px;cursor:pointer}
  .toggle:hover{color:var(--phos);border-color:var(--phos-dim)}
  .bar a{color:var(--phos-dim);text-decoration:none}.bar a:hover{color:var(--phos)}
  /* README info card — the "what is this?" layer (parsed from each fiddle's README) */
  .info{display:none;border-bottom:1px solid var(--line);background:var(--phos-bg);padding:10px 16px;font-family:var(--mono);position:relative}
  .info::before{content:"";position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,rgba(0,0,0,.14) 0,rgba(0,0,0,.14) 1px,transparent 1px,transparent 3px);opacity:.5}
  .info>*{position:relative}
  .info .desc{color:var(--text);font-size:12px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden}
  .info .more{font-family:var(--mono);font-size:10.5px;color:var(--phos-dim);background:transparent;border:none;cursor:pointer;padding:2px 0;margin-top:2px}
  .info .more:hover{color:var(--phos)}
  .info .d{color:var(--muted);font-size:10.5px;white-space:nowrap}
  .info .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px;align-items:center}
  .info .tag{font-size:10px;color:var(--phos-dim);border:1px solid var(--line);border-radius:999px;padding:2px 8px;white-space:nowrap}
  .info a{color:var(--phos-dim);text-decoration:none;font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 8px}
  .info a:hover{color:var(--phos);border-color:var(--phos-dim)}
  .info::-webkit-scrollbar{width:8px}.info::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .stage{flex:1;min-height:0;position:relative;padding:22px;background:radial-gradient(130% 90% at 50% 0%,#0d150d 0%,var(--ink) 72%)}
  .stage iframe{width:100%;height:100%;border:1px solid var(--line);border-radius:10px;background:#fff;box-shadow:0 0 0 1px rgba(51,255,51,.05),0 20px 55px rgba(0,0,0,.55)}
  .code{display:none;position:absolute;inset:22px;flex-direction:column;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel);box-shadow:0 20px 55px rgba(0,0,0,.55)}
  .tabs{display:flex;gap:2px;overflow-x:auto;background:var(--phos-bg);border-bottom:1px solid var(--line);padding:6px 6px 0;flex:none}
  .tabs::-webkit-scrollbar{height:0}
  .tab{font-family:var(--mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid transparent;border-bottom:none;border-radius:6px 6px 0 0;padding:6px 10px;cursor:pointer;white-space:nowrap}
  .tab:hover{color:var(--phos)}
  .tab.active{color:var(--phos);background:var(--panel);border-color:var(--line)}
  .code pre{margin:0;flex:1;overflow:auto;padding:16px 18px;font-family:var(--mono);font-size:12.5px;line-height:1.55;color:var(--text);white-space:pre;tab-size:2}
  .empty{flex:1;display:grid;place-items:center;color:var(--muted);font-family:var(--mono);font-size:13px}
  aside::-webkit-scrollbar{width:8px}aside::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  /* mobile: the 300px sidebar becomes an off-canvas drawer; the stage gets the screen */
  .menuBtn{display:none;background:transparent;border:1px solid var(--line);border-radius:6px;color:var(--phos);font-size:16px;padding:4px 10px;cursor:pointer;flex:none;font-family:var(--mono)}
  .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:40}
  @media(max-width:720px){
    body{grid-template-columns:1fr}
    header{padding:10px 12px;gap:10px}
    header h1{font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    header h1 .dim2{display:none} /* the "— a decade of build-to-learn" tail */
    .menuBtn{display:inline-block}
    aside{position:fixed;top:0;bottom:0;left:0;width:min(84vw,320px);z-index:50;background:var(--ink);
      transform:translateX(-105%);transition:transform .2s ease;box-shadow:12px 0 40px rgba(0,0,0,.5)}
    body.nav-open aside{transform:translateX(0)}
    body.nav-open .backdrop{display:block}
    .bar{padding:7px 10px;font-size:11px;flex-wrap:wrap}
    .stage{padding:10px}
    .code{inset:10px}
    .info{padding:8px 12px}
    .info .desc{-webkit-line-clamp:3}
  }
</style>
</head>

r message: Error: The /usr/local directory is not writable. Even if this directory was writable when you installed Homebrew, other software may change permissions on this directory. For example, upgrading to OS X El Capitan has been known to do this. Some versions of the \"InstantOn\" component of Airfoil or running Cocktail cleanup/optimizations are known to do this as well. You should probably change the ownership and permissions of /usr/local back to your user account. sudo chown -R $(whoami):admin /usr/local This simple script, which (will) add a new function to the _utils.sh script can be used to recursively grant admin permissions to the current user for a given directory. The new utils function grantAdmin is based on the command suggested in the above message. Its accepts a path and then recursively updates its permissions.","date":"05-21-16","tags":["bash","chown","whoami","admin","user","local"]},{"framework":"bash","name":"fiddle-0083-Nvm","friendly":"Nvm","url":"f/bash/fiddle-0083-Nvm/","thumb":null,"live":false,"files":["bin/_utils.sh","README.markdown","run.sh"],"title":"Install Node Version Manager","desc":"Simple shell script for installing node version manager. NVM allows you to run (or maintain) multiple versions of Node.js on your machine.","date":"05-22-16","tags":["bash","curl","node","nvm"]},{"framework":"bash","name":"fiddle-0084-NativeScript","friendly":"NativeScript","url":"f/bash/fiddle-0084-NativeScript/","thumb":null,"live":false,"files":["bin/_utils.sh","bin/nativescript/_create.sh","bin/nativescript/_install.sh","bin/nativescript/_start.sh","bin/nativescript/README.markdown","README.markdown","run.sh","template/README.md"],"title":"Install / Create / Start NativeScript Project","desc":"This POC explores how to use the angular2 advanced seeder as starting point for a new nativeScript project. NOTE - Using this seeder is bit painful in that Node ver 5.0 is required to install all of the project dependencies. However, Node ver 4. is require n","run.sh","template/index.html","template/package.json"],"title":"Node-Webkit","desc":"POC exploring how to configure Node-Webkit and create a hello world app. The script automates the follow work-flow: 1. Verify that \"nwjs\" is not available via the command line 2. Verify that home brew is installed 3. Install \"nwjs\" using home brew 4. Add the path to the nwjs executable to user's .bash_profile 5. Verify that node and npm is installed 6. Create an app directory 7. Add the template/* files 8. Install the app dependencies using npm 9. Startup the app using nwjs","date":"06-04-16","tags":["bash","brew","nwjs","node","npm","markdown"]},{"framework":"bash","name":"fiddle-0090-Zmq","friendly":"Zmq","url":"f/bash/fiddle-0090-Zmq/","thumb":null,"live":false,"files":["bin/_utils.sh","bin/brew/_update.sh","bin/zmq/_install.sh","bin/zmq/_uninstall.sh","README.markdown","run.sh"],"title":"ZeroMq","desc":"POC exploring how to install and configure zeromq. The script automates the following steps: 1. uninstall zeromq base library using home brew 2. install the zeromq library using homebrew 3. install the node zmq module using npm 4. test the configuration using the node CLI This recipe is based on the steps outlined at the beginning of Chapter 4 of Jim R. Wilson's book Node.js the Right Way.","date":"06-07-16","tags":["bash","brew","node","npm","zeromq","zmq"]},{"framework":"bash","name":"fiddle-0091-SplitDelimitedString","friendly":"SplitDelimitedString","url":"f/bash/fiddle-0091-SplitDelimitedString/","thumb":null,"live":false,"files":["bin/_utils.sh","README.markdown","run.sh"],"title":"Splitting a Delimited String","desc":"I awoke this morning with a recurring question: How do you split a delimited string in bash shell???. This POC answers this question. It adds a parseName and split function to the existing _util.sh script. The parseName function accepts a single input string of the form fiddle-####- . For example, \"fiddle-0010-CrossCom\". The split function accepts two input parameters the target string and the string delimiter and returns an array. The parseName function invokes the split function passing - as the delimiter. It then returns the second element of result. For example, parseName fiddle-0010-CrossCom returns CrossCom. To see this in action, execute the run.sh script in the root directory. Finally for additional reference, see Stack Overflow > Question 918886.","date":"09-16-16","tags":["bash","array"]},{"framework":"bash","name":"fiddle-0092-InitJavaProject","friendly":"InitJavaProject","url":"f/bash/fiddle-0092-InitJavaProject/","thumb":null,"live":false,"files":["fiddles/java/template/README.md","README.md","run.sh","scripts/bin/_utils.sh","scripts/bin/java/_create.sh","scripts/bin/java/_fork.sh","scripts/bin/java/_install.sh","scripts/bin/java/_start.sh","scripts/bin/java/README.markdown","scripts/fiddle-java.sh","test.sh"],"title":"Init Java Project","desc":"Lately in cubicle space/time I have been working with the Spring JVM Framework. Exposure to this framework has led me to wonder if fiddle.sh could be extended to provide Java based fiddle support. With that in mind, a bash POC is in order. Specifically, can a simple Java project be initialized from the command line using Spring?","date":"09-19-16","tags":["bash","java","spring"]},{"framework":"bash","name":"fiddle-0093-InitAndroidProject","friendly":"InitAndroidProject","url":"f/bash/fiddle-0093-InitAndroidProject/","thumb":null,"live":false,"files":["fiddles/android/fiddle-0000-Template/gradleCfg/build.gradle","fiddles/android/fiddle-0000-Template/gradleCfg/gradle-wrapper.properties","fiddles/android/fiddle-0000-Template/README.md","fiddles/android/fiddle-0000-Template/template/build.gradle","fiddles/android/fiddle-0000-Template/template/gradle/wrapper/gradle-wrapper.properties","fiddles/android/fiddle-0000-Template/template/local.properties","fiddles/android/fiddle-0000-Template/template/src/main/AndroidManifest.xml","fiddles/android/fiddle-0000-Template s/bin/javac/_start.sh","scripts/fiddle-create.sh","scripts/fiddle-delete.sh","scripts/fiddle-edit.sh","scripts/fiddle-fork.sh"],"title":"Init C Project","desc":"This one actually intersects (or is an intersection) with cubicle space time. Increasingly, I need the ability to create a simple java based command line app that explores a specific feature of java and/or single library without involving a full blown IDE or Maven repo. The existing Java fiddle template, which is aimed at gradle/Maven/Spring, is over kill in this regard. For instance, if you simply want to try something with apache's http library or play with a Java 8 Lambda function, then creating a full-blown Spring based end point is beyond the pale. Not to mention, I have yet to determine why java fiddles (in their current form) can't actually be initialized during cubicle space time (aka within the fire wall). This alternate Java fiddle template, which would be designated javac, would bridge that gap. Per the norm, the starting point for any fiddle.sh enhancement is a bash fiddle. The fiddle should be forked from bash fiddle #94, which should provide a good blue print for the changes required.","date":"09-30-16","tags":["bash","javac","java"]},{"framework":"bash","name":"fiddle-0096-AndroidDeviceScreenShot","friendly":"AndroidDeviceScreenShot","url":"f/bash/fiddle-0096-AndroidDeviceScreenShot/","thumb":null,"live":false,"files":["README.md","run.sh"],"title":"Android Device Screenshot","desc":"From the command line its possible to generate a screenshot of a connected android device using the android adb utility. When developing apps, it would be great to have a function that automates this command.","date":"08-09-17","tags":["bash","abd","android"]},{"framework":"bash","name":"fiddle-0097-Protractor","friendly":"Protractor","url":"f/bash/fiddle-0097-Protractor/","thumb":null,"live":false,"files":["conf.js","install.sh","README.md","run.sh","spec.js","start-server.sh"],"title":"Protractor Setup & Test","desc":"Shell script that automates the steps outlined in the [Protractor Getting Started Tutorial] (https://github.com/angular/protractor/blob/master/docs/tutorial.md) after installing protractor, it uses protractor to run a simple test against the Protractor demo app.","date":"09-05-17","tags":["bash","java","npm","protractor","webdriver-manager"]},{"framework":"bash","name":"fiddle-0098-NodeProcessManager","friendly":"NodeProcessManager","url":"f/bash/fiddle-0098-NodeProcessManager/","thumb":null,"live":false,"files":["README.md","run.sh"],"title":"Node Process Manager","desc":"Bash fiddle that explores how to initiate the angular-seeder repo's end-to-end (e2e) process using a a single terminal session (or thread). Specifically, the POC does the following: 1. Clones and installs the Angular-Seed github repo 2. Installs Node Process Manager (pm2) 3. Uses Node Process Manager (pm2) to startup selenium web driver 4. Uses Node Process Manager (pm2) to startup the repo's on board dev web server 5. Kicks of the repo's e2e run process 6. Once the e2e process completes (5), its uses pm2 to kill the two secondary threads (3,4)","date":"11-21-17","tags":["bash","node","angular-seed","e2e","pm2","sleep","protractor","webdriver-manager"]},{"framework":"bash","name":"fiddle-0099-GlobalFiddleFunction","friendly":"GlobalFiddleFunction","url":"f/bash/fiddle-0099-GlobalFiddleFunction/","thumb":null,"live":false,"files":["README.md","run.sh","scripts/bin/_env.sh","scripts/bin/_types.sh","scripts/bin/_utils.sh","scripts/bin/setup/_setup.sh","scripts/bin/setup/mac/_bash.sh","scripts/fiddle-setup.sh","scripts/fiddle.sh","test.sh"],"title":"Global Fiddle Function","desc":"I am sick of having to navigate to the scripts directory every time I want to execute fiddle.sh. How do I automate these steps using a globally defined fiddle function? Assuming there is no learning curve obstruction, how do I then automate the installation (aka setup) of said function? Time for my favorite: an actual rap Nav Bar","desc":"Fiddle modelling the bootstrap navbar control using ES6 classes.","date":"12-12-15","tags":["es6","bootstrap","navbar"],"fork":"fiddle-0036-NavBar","pen":"http://jsfiddle.net/bradyhouse/8wrnbnqm/"},{"framework":"jquery","name":"fiddle-0038-CorsRequest","friendly":"CorsRequest","url":"f/jquery/fiddle-0038-CorsRequest/","thumb":null,"live":true,"files":["index.html","app.js","README.markdown"],"title":"CORS Request","desc":"CORS! CORS! CORS! Is there no way to perform a cross domain AJAX request without getting CORS error? And I am not talking JSONP. I simply want a AJAX Call that will return the Apple Itunes RSS feed. Is that so wrong?? I am not sure if it is wrong or right, but there is a way: Its called a secondary server. You can short circuit CORS Requests errors using a secondary server to wrap the response with the required allow-* headers. And this can be accomplished (for free) using open shift. The subsequent section details how to configure a node.js based REST Service that will wrap any URL with the necessary headers.","date":"07-20-16","tags":["jquery","CORS","openshift","node.js"],"pen":"https://jsfiddle.net/bradyhouse/Lqemmdyv/"},{"framework":"jquery","name":"fiddle-0039-MomentJs","friendly":"MomentJs","url":"f/jquery/fiddle-0039-MomentJs/","thumb":null,"live":true,"files":["index.html","app.js","README.markdown"],"title":"House jQuery Fiddle - fiddle-0039-MomentJs","desc":"A week doesn't go by when I don't encounter a date formatting issue. In the modular NPM world, date formatting requires a moment.js dependency. As I am new to moment.js, a fiddle is in order. In particular, I need a simple fiddle that demonstrates all of the different format strings supported by moment.js. To keep things simple, the fiddle should use the NPM CDN copy of moment.js.","date":"08-01-16","tags":["jquery","moment.js","format"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0039-MomentJs/index.html"},{"framework":"jquery","name":"fiddle-0040-FabricJs","friendly":"FabricJs","url":"f/jquery/fiddle-0040-FabricJs/","thumb":null,"live":true,"files":["index.html","app.js","README.markdown"],"title":"House jQuery Fiddle - fiddle-0040-FabricJs","desc":"I just spent 2 weeks of my free time (after 5 and weekends) writing SVG fiddle 27. After publishing the fiddle, I then tried opening it from my iphone -- blank screen. Straight SVG doesn't actually work on mobile devices. According to stack overflow, you need to use a polyfill that converts the SVG to an HTML5 canvas. Fabric.js is one such library. And so, time for another fiddle.","date":"08-05-16","tags":["jquery","fabric.js"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0040-FabricJs/index.html"},{"framework":"jquery","name":"fiddle-0041-FabricImageCloud","friendly":"FabricImageCloud","url":"f/jquery/fiddle-0041-FabricImageCloud/","thumb":null,"live":true,"files":["index.html","app.js","README.markdown","src/init.js","src/meta.js","src/model/Photo.js","src/model/PhotoAlbum.js","src/namespace.js","src/toolkit/animate-image-options.js","src/toolkit/base.js","src/toolkit/canvas.js","src/toolkit/image.js","src/toolkit/util.js"],"title":"Fabric.js Image Cloud","desc":"I love SVG Fiddle #27. However, it doesn't work on my iphone. So can I create a similar POC using fabric.js that is accessible via my iphone?","date":"08-17-16","tags":["jQuery","fabric.js"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0041-FabricImageCloud/index.html"},{"framework":"jquery","name":"fiddle-0042-EniPuzzle","friendly":"EniPuzzle","url":"f/jquery/fiddle-0042-EniPuzzle/","thumb":null,"live":true,"files":["index.html","app.js","README.md","resources/css/custom.css","src/init.js","src/metadata.js","src/model/row.js","src/model/square.js","src/store/rows.js","src/store/squares.js","src/Util.js","src/view/board.js","src/view/toolbar.js","static.html"],"title":"Eni Puzzle","desc":"Create a straight Javascript POC (ES6 + JQuery + bootstrap) that virtualizes enipuzzle. The POC should present a grid of 64 colored cells. The palette should consist of 8 colors: yellow, yellow-green, blue-green, blue, violet, red-orange, orange, yellow-orange. There should be 7 yellow-green cells. All other colors should be applied to exactly 8 cells. On startup, the colors of the cells should be randomly distributed throughout the grid, with the last cell of the grid be left blank (transparent). The surrounding background of the app should be white. To complete the puzzle, the user must put the cells in order by color from left to right. Horizontal rotation is virtualized by swiping individual rows to the left or right. Cells can be re-ordered vertically using the one empty (transparent) square.","date":"01-23-17","tags":["jquery","bootstrap","es6"],"pen":"https://jsfiddle.net/bradyhouse/njhh85ve/"},{"framework":"jquery","name":"fiddle-0043-DragAndDropApi","friendly":"DragAndDropApi","url":"f/jquery/fiddle-0043-DragAndDropApi/","thumb":null,"live":true,"files":["index.html","app.js","custom.css","README.md"],"title":"HTML Drag And Drop API","desc":"Simple fiddle exploring the features of the HTML Drag and Drop API.","date":"01-31-17","tags":["jQuery draggagle","ondragstart","ondrop","ondragover","preventdefaults"],"pen":"https://jsfiddle.net/bradyhouse/wcp34476/"},{"framework":"jquery","name":"fiddle-0044-HashSet","friendly":"HashSet","url":"f/jquery/fiddle-0044-HashSet/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight (IsPalindrome) | HashSet Solution","desc":"Fiddle exploring the solution to the Code Fight isListPalindrome: Given a singly linked list of integers, determine whether or not it's a palindrome. Example For l = [0, 1, 0], the output should be isListPalindrome(l) = true; For l = [1, 2, 2, 3], the output should be isListPalindrome(l) = false. In this approach, I solved the problem by defining a Hashset.","date":"06-02-17","tags":["jquery","code fight","hashset"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0044-HashSet/index.html"},{"framework":"jquery","name":"fiddle-0045-IsPalindrome","friendly":"IsPalindrome","url":"f/jquery/fiddle-0045-IsPalindrome/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight (isPalindrome)","desc":"Fiddle exploring the solution to the Code Fight isListPalindrome: Given a singly linked list of integers, determine whether or not it's a palindrome. Example For l = [0, 1, 0], the output should be isListPalindrome(l) = true; For l = [1, 2, 2, 3], the output should be isListPalindrome(l) = false.","date":"06-02-17","tags":["jQuery","code fight"],"fork":"fiddle-0044-HashSet","pen":"http://bradyhouse.github.io/jquery/fiddle-0045-IsPalindrome/index.html"},{"framework":"jquery","name":"fiddle-0046-WordLadder","friendly":"WordLadder","url":"f/jquery/fiddle-0046-WordLadder/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"desc":"Fiddle exploring the solution to the Code Fight WordLadder Problem: Given two words, beginWord and endWord, and a wordList of approved words, find the length of the shortest transformation sequence from beginWord to endWord such that: Only one letter can be changed at a time Each transformed word must exist in the wordList. Return the length of the shortest transformation sequence, or 0 if no such transformation sequence exists. Note: beginWord does not count as a transformed word. You can assume that beginWord and endWord are not empty and are not the same. Example For beginWord = \"hit\", endWord = \"cog\", and wordList = [\"hot\", \"dot\", \"dog\", \"lot\", \"log\", \"cog\"], the output should be wordLadder(beginWord, endWord, wordList) = 5. The shortest transformation is \"hit\" -> \"hot\" -> \"dot\" -> \"dog\" -> \"cog\" with a length of 5.","date":"06-16-17","tags":["jquery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0046-WordLadder/index.html"},{"framework":"jquery","name":"fiddle-0047-RemoveKFromList","friendly":"RemoveKFromList","url":"f/jquery/fiddle-0047-RemoveKFromList/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight (RemoveKFromList)","desc":"Fiddle exploring the solution to the Code Fight removeKfromList Problem: Given a singly linked list of integers l and a non-negative integer k, remove all elements from list l that have a value equal to k. Example For l = [3, 1, 2, 3, 4, 5] and k = 3, the output should be removeKFromList(l, k) = [1, 2, 4, 5]; For l = [1, 2, 3, 4, 5, 6, 7] and k = 10, the output should be removeKFromList(l, k) = [1, 2, 3, 4, 5, 6, 7]. Input/Output [time limit] 4000ms (js) [input] linkedlist.integer l A singly linked list of integers. Guaranteed constraints: 0 ≤ list size ≤ 105, -1000 ≤ element value ≤ 1000. [input] integer k A non-negative integer. Guaranteed constraints: -1000 ≤ k ≤ 1000. [output] linkedlist.integer Return l with all the values equal to k removed.","date":"06-19-17","tags":["jquery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0047-RemoveKFromList/index.html#"},{"framework":"jquery","name":"fiddle-0048-AddTwoHugeNumbers","friendly":"AddTwoHugeNumbers","url":"f/jquery/fiddle-0048-AddTwoHugeNumbers/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight (AddTwoHugeNumbers)","desc":"Fiddle exploring the solution to the Code Fight AddTwoHugeNumbers Problem: You're given 2 huge integers represented by linked lists. Each linked list element is a number from 0 to 9999 that represents a number with exactly 4 digits. The represented number might have leading zeros. Your task is to add up these huge integers and return the result in the same format. Example For a = [9876, 5432, 1999] and b = [1, 8001], the output should be addTwoHugeNumbers(a, b) = [9876, 5434, 0]. Explanation: 987654321999 + 18001 = 987654340000. For a = [123, 4, 5] and b = [100, 100, 100], the output should be addTwoHugeNumbers(a, b) = [223, 104, 105]. Explanation: 12300040005 + 10001000100 = 22301040105.","date":"06-19-17","tags":["jquery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0048-AddTwoHugeNumbers/index.html#"},{"framework":"jquery","name":"fiddle-0049-SlickGridColGroups","friendly":"SlickGridColGroups","url":"f/jquery/fiddle-0049-SlickGridColGroups/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"slickgrid-kunovsky + slickgrid-colgroup-plugin = ?","desc":"Can slickgrid-kunovsky fork of the slick-grid be used with the slickgrid-colgroup-plugin library??? This fiddle will attempt to answer that using a simple example that marries up the two libraries via unpkg.com references. The answer is: \"Nope!\" The plugin is based on version 2.1.0. Kunovsky's library is based on version 2.2.0.","date":"06-21-17","tags":["jQuery","slickgrid-kunovsky","slickgrid-colgroup-plugin"]},{"framework":"jquery","name":"fiddle-0050-SlickGridCustomColGroups","friendly":"SlickGridCustomColGroups","url":"f/jquery/fiddle-0050-SlickGridCustomColGroups/","thumb":null,"live":true,"files":["index.html","app.js","README.md","slick.colgroup.js","slick.grid.js","slick.grid.x.js"],"title":"slickgrid-kunovsky + slickgrid-colgroup-plugin = ?","desc":"Can slickgrid-kunovsky fork of the slick-grid be used with the slickgrid-colgroup-plugin library??? This fiddle will attempt to answer that using a simple example that marries up the two libraries via unpkg.com references. The answer is: \"Nope!\" The plugin is based on version 2.1.0. Kunovsky's library is based on version 2.2.0.","date":"06-21-17","tags":["jQuery","slickgrid-kunovsky","slickgrid-colgroup-plugin"],"fork":"fiddle-0049-SlickGridColGroups","pen":"http://plnkr.co/edit/PQzWTZ?p=preview"},{"framework":"jquery","name":"fiddle-0051-AlmostIncreasingSequence","friendly":"AlmostIncreasingSequence","url":"f/jquery/fiddle-0051-AlmostIncreasingSequence/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Almost Increasing Sequence","desc":"Fiddle exploring the solution to the Code Fight AlmostIncreasingSequence Problem: Given a sequence of integers as an array, determine whether it is possible to obtain a strictly increasing sequence by removing no more than one element from the array. Example For sequence = [1, 3, 2, 1], the output should be almostIncreasingSequence(sequence) = false; There is no one element in this array that can be removed in order to get a strictly increasing sequence. For sequence = [1, 3, 2], the output should be almostIncreasingSequence(sequence) = true. You can remove 3 from the array to get the strictly increasing sequence [1, 2]. Alternately, you can remove 2 to get the strictly increasing sequence [1, 3].","date":"07-03-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0047-RemoveKFromList/index.html#"},{"framework":"jquery","name":"fiddle-0052-ReverseParentheses","friendly":"ReverseParentheses","url":"f/jquery/fiddle-0052-ReverseParentheses/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"ReverseParentheses","desc":"Fiddle exploring the solution to the Code Fight Reverse Parentheses problem: You have a string s that consists of English letters, punctuation marks, whitespace characters, and brackets. It is guaranteed that the parentheses in s form a regular bracket sequence. Your task is to reverse the strings contained in each pair of matching parentheses, starting from the innermost pair. The results string should not contain any parentheses. Example For string s = \"a(bc)de\", the output should be reverseParentheses(s) = \"acbde\". Input/Output [time limit] 4000ms (js) [input] string s A string consisting of English letters, punctuation marks, whitespace characters and brackets. It is guaranteed that parentheses form a regular bracket sequence. Constraints: 5 ≤ s.length ≤ 55. [output] string","date":"07-08-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0052-ReverseParentheses/index.html#"},{"framework":"jquery","name":"fiddle-0053-AreSimilar","friendly":"AreSimilar","url":"f/jquery/fiddle-0053-AreSimilar/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"desc":"Fiddle exploring the solution to the Code Fight Reverse Parentheses problem: You have a string s that consists of English letters, punctuation marks, whitespace characters, and brackets. It is guaranteed that the parentheses in s form a regular bracket sequence. Your task is to reverse the strings contained in each pair of matching parentheses, starting from the innermost pair. The results string should not contain any parentheses. Example For string s = \"a(bc)de\", the output should be reverseParentheses(s) = \"acbde\". Input/Output [time limit] 4000ms (js) [input] string s A string consisting of English letters, punctuation marks, whitespace characters and brackets. It is guaranteed that parentheses form a regular bracket sequence. Constraints: 5 ≤ s.length ≤ 55. [output] string","date":"07-22-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0053-AreSimilar/index.html#"},{"framework":"jquery","name":"fiddle-0054-ArrayChange","friendly":"ArrayChange","url":"f/jquery/fiddle-0054-ArrayChange/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight - Array Change","desc":"Fiddle exploring the solution to the Code Fight Array Change problem: You are given an array of integers. On each move you are allowed to increase exactly one of its element by one. Find the minimal number of moves required to obtain a strictly increasing sequence from the input. Example For inputArray = [1, 1, 1], the output should be arrayChange(inputArray) = 3. Input/Output [time limit] 4000ms (js) [input] array.integer inputArray Guaranteed constraints: 3 ≤ inputArray.length ≤ 105, -105 ≤ inputArray[i] ≤ 105. [output] integer The minimal number of moves needed to obtain a strictly increasing sequence from inputArray. It's guaranteed that for the given test cases the answer always fits signed 32-bit integer type.","date":"07-24-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0054-ArrayChange/index.html#"},{"framework":"jquery","name":"fiddle-0055-PalindromeRearranging","friendly":"PalindromeRearranging","url":"f/jquery/fiddle-0055-PalindromeRearranging/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"CodeFight - Palindrome Rearranging","desc":"Fiddle exploring the solution to the Code Fight Palindrome Rearranging problem: Given a string, find out if its characters can be rearranged to form a palindrome. Example For inputString = \"aabb\", the output should be palindromeRearranging(inputString) = true. We can rearrange \"aabb\" to make \"abba\", which is a palindrome. Input/Output [time limit] 4000ms (js) [input] string inputString A string consisting of lowercase English letters. Guaranteed constraints: 1 ≤ inputString.length ≤ 50. [output] boolean true if the characters of the inputString can be rearranged to form a palindrome, false otherwise.","date":"07-27-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0055-PalindromeRearranging/index.html#"},{"framework":"jquery","name":"fiddle-0056-AvoidObstacles","friendly":"AvoidObstacles","url":"f/jquery/fiddle-0056-AvoidObstacles/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight - Avoid Obstacles","desc":"Fiddle exploring the solution to the Code Fight Avoid Obstacles problem: You are given an array of integers representing coordinates of obstacles situated on a straight line. Assume that you are jumping from the point with coordinate 0 to the right. You are allowed only to make jumps of the same length represented by some integer. Find the minimal length of the jump enough to avoid all the obstacles. Example For inputArray = [5, 3, 6, 7, 9], the output should be avoidObstacles(inputArray) = 4.","date":"07-27-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0056-AvoidObstacles/index.html#"},{"framework":"jquery","name":"fiddle-0057-MineSweeper","friendly":"MineSweeper","url":"f/jquery/fiddle-0057-MineSweeper/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight - MineSweeper","desc":"Fiddle exploring the solution to the Code Fight Mine Sweeper problem: In the popular Minesweeper game you have a board with some mines and those cells that don't contain a mine have a number in it that indicates the total number of mines in the neighboring cells. Starting off with some arrangement of mines we want to create a Minesweeper game setup. Example For matrix = [[true, false, false], [false, true, false], [false, false, false]] the output should be minesweeper(matrix) = [[1, 2, 1], [2, 1, 1], [1, 1, 1]]","date":"08-01-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0057-MineSweeper/index.html#"},{"framework":"jquery","name":"fiddle-0058-VariableName","friendly":"VariableName","url":"f/jquery/fiddle-0058-VariableName/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Code Fight - Variable Name","desc":"Fiddle exploring the solution to the Code Fight Variable Name problem: Correct variable names consist only of Latin letters, digits and underscores and they can't start with a digit. Check if the given string is a correct variable name. Example For name = \"var_1__Int\", the output should be variableName(name) = true; For name = \"qq-q\", the output should be variableName(name) = false; For name = \"2w2\", the output should be variableName(name) = false.","date":"08-01-17","tags":["jQuery","code fight"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0058-VariableName/index.html#"},{"framework":"jquery","name":"fiddle-0059-BeautifulString","friendly":"BeautifulString","url":"f/jquery/fiddle-0059-BeautifulString/","thumb":null,"live":true,"files":["index.html","app.js","README. eader (and footer) bar to a page using bootstrap 4. It also explores how to use CSS media blocks to control which navbars are visible depending on the browsers screen width. Finally, it answers another bootstrap question: How do you center multiple form controls within a navbar while also having elements right and left justified without using a table? Ok, it's a boring one, but critical to understand when designing across devices.","date":"10-17-18","tags":["jQuery","bootstrap 4","@media"],"pen":"http://bradyhouse.github.io/jquery/fiddle-0069-BootstrapStickyNavBars/index.html"},{"framework":"jquery","name":"fiddle-0070-FabricThermometerAnimation","friendly":"FabricThermometerAnimation","url":"f/jquery/fiddle-0070-FabricThermometerAnimation/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"Fabric.js Thermometer with Configurable Image Meniscus","desc":"Jquery Fiddle #68 uses a crude approach to animation. Essentially, it just redraws the canvas in loop. In each pass it increments the height (position) of the meniscus. This is fine except that it seems to introduce a flicker effect. I need to figure out how to fix this--i.e. what's the right way to do animation in fabric.js?","date":"10-03-18","tags":["jquery","fabric.js","bootstrap 4","filereader"],"fork":"fiddle-0063-FabricThermometer","pen":"https://jsfiddle.net/bradyhouse/b6n7gqtf/"},{"framework":"jquery","name":"fiddle-0071-SpinningLoader","friendly":"SpinningLoader","url":"f/jquery/fiddle-0071-SpinningLoader/","thumb":null,"live":true,"files":["index.html","app.css","app.js","bootstrap.min.css","README.md"],"desc":"Another jQuery Fiddle.","date":"12-13-18","tags":["jQuery"]},{"framework":"jquery","name":"fiddle-0072-6000Particles","friendly":"6000Particles","url":"f/jquery/fiddle-0072-6000Particles/","thumb":null,"live":true,"files":["index.html","app.js","README.md"],"title":"6000 Particles","desc":"I want to create a game based on this fabric.js demo => http://fabricjs.com/particles. Time for a jquery fiddle.","date":"01-28-19","tags":["jQuery","fabric.js","fabric.util.requestAnimFrame"],"pen":"https://jsfiddle.net/bradyhouse/0pqx81y4/"},{"framework":"jquery","name":"fiddle-0073-FrameCookies","friendly":"FrameCookies","url":"f/jquery/fiddle-0073-FrameCookies/","thumb":null,"live":true,"files":["index.html","app.js","frame.html","README.md"],"desc":"Okay, imagine you have web page that is loaded into an iframe. And imagine, that the web page offers a deeplink feature that manages state via query string parameters. User makes changes, and then they can create a deeplink to the page that restores their changes using the values passed via the querystring -- standard stuff. However, the parent page, containing the child iframe, always resets the iframe to the original URL effectively breaking the deeplink functionality. In other words, there are no query string parameters. Riddle me a fiddle! My idea: Pass the parameters via cookie instead of querystring. Its a little complicated, but essentially here is the cock tail napkin workflow: As crudely depicted (above), there are 2 pages -- index.html frame.html The workflow is recursive--ie the story is told from the perspective of the index.html page. Its begins when index.html page is loaded outside a frame. On ready, the page test whether it has query string parameters. If no, it does nothing. If yes, it writes a cookie for the /frame.html page, and redirects the browser to the frame.html page, triggering its load event a second time. This time because there is no query string, it reads (or digests) the query string parameters from the parent frame cookie. After processing the data, it deletes the cookie from memory. Using this approach query string parameters (aka deep links) can be generated and processed by the index.html page even though it is loaded in a child frame without any window.location.search criteria.","date":"02-19-19","tags":["jquery","cookies","iframe","window.location.search"]},{"f ) 5. allowHeaders (optional) 6. convertToJson (optional) The url parameters is used to initiate a secondary HTTP request using the npm request lib. Its required. If this parameter is not included, then a forbidden response, HTTP 403 error, should be generated. The other 4 parameters are optional. When present they are used to add the associated CORS header to the response.","date":"08-31-16","tags":["node.js","hamony","process","argv","fs","request"]},{"framework":"node","name":"fiddle-0020-WebSocketServer","friendly":"WebSocketServer","url":"f/node/fiddle-0020-WebSocketServer/","thumb":null,"live":false,"files":["app.js","npm-shrinkwrap.json","package.json","public/404.htm","public/index.htm","README.md"],"desc":"POC based on the Web Socket server example discussed in chapter 4 of Nathanael Anderson's book, Getting Started with NativeScript. It explores how to create a node based web server with web socket support.","date":"09-24-16","tags":["node.js","hamony","process","argv","fs","ws"]},{"framework":"node","name":"fiddle-0021-DirectoryWatcher","friendly":"DirectoryWatcher","url":"f/node/fiddle-0021-DirectoryWatcher/","thumb":null,"live":false,"files":["app.js","config/content-types.js","config/directories.js","config/index-file.js","config/state.js","npm-shrinkwrap.json","package.json","README.md","server/events/on-archive-file.js","server/events/on-archive-start.js","server/events/on-create-directory.js","server/events/on-create-index.js","server/events/on-index-file.js","server/events/on-watch.js","server/server.js"],"title":"Directory Watcher","desc":"POC exploring the integration of the following npm packages: watchdirectory file-move verify-path npmlog cluster moment create-file jfile","date":"10-04-16","tags":["node.js","hamony","process","argv","fs","verify-path","file-move","watchdirectory","npmlog","moment","cluster","create-file"]},{"framework":"node","name":"fiddle-0022-Gulp","friendly":"Gulp","url":"f/node/fiddle-0022-Gulp/","thumb":null,"live":false, ack","eslint","prettier","vite","vitest","ag-grid","vueuse","font-awesome"],"fork":"fiddle-0016-AgGridContextMenuIconJs","pen":"https://stackblitz.com/edit/vitejs-vite-vjqyvbvd?file=README.md"},{"framework":"vue","name":"fiddle-0020-TetrisJs","friendly":"TetrisJs","url":"f/vue/fiddle-0020-TetrisJs/","thumb":null,"live":true,"files":["README.md"],"desc":"Another simple Vue fiddle.","date":"08-02-25","tags":["vue","vue-router","pinia","playwright","rushstack","eslint","prettier","vite","vitest"]}];
  const FAVORITE = "three/fiddle-0011-PlanetTween";
  // Prettify a fiddle name for display: SelectAppend → Select Append,
  // CSVReporter → CSV Reporter, ent_ag-grid → ent ag grid. (Raw name is kept
  // for hashes/links.)
  function humanize(s){
    return String(s)
      .replace(/[-_]+/g,' ')
      .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')
      .replace(/([a-z\d])([A-Z])/g,'$1 $2')
      .replace(/\s+/g,' ').trim();
  }
  const nav = document.getElementById('nav'), frame = document.getElementById('frame'),
        empty = document.getElementById('empty'), cur = document.getElementById('cur'), pop = document.getElementById('pop'),
        stage = document.getElementById('stage'), code = document.getElementById('code'),
        tabs = document.getElementById('tabs'), src = document.getElementById('src'), codeBtn = document.getElementById('codeBtn'),
        info = document.getElementById('info');
  // README info card — everything set via textContent (never innerHTML) so README
  // content can't inject markup.
  function renderInfo(f){
    info.innerHTML='';
    // No title row — the bar above already reads "framework / Title". The card is
    // the description (full width) plus a meta row: date · tags · lineage · pen.
    if(!(f.desc || (f.tags&&f.tags.length) || f.fork || f.pen)){ info.style.display='none'; return; }
    if(f.desc){
      const p=document.createElement('div'); p.className='desc'; p.textContent=f.desc; info.appendChild(p);
      // When the 4-line clamp hides text, "… readme" opens the full README in the
      // source view (every assembled fiddle ships its README in files[]).
      requestAnimationFrame(function(){
        const readme=(f.files||[]).find(x=>/^readme.(md|markdown)$/i.test(x));
        if(readme && p.scrollHeight > p.clientHeight + 1){
          const btn=document.createElement('button'); btn.className='more'; btn.textContent='… readme';
          btn.onclick=function(){ setView(true); loadCode(f, readme); };
          p.after(btn);
        }
      });
    }
    const meta=document.createElement('div'); meta.className='meta';
    if(f.date){ const d=document.createElement('span'); d.className='d'; d.textContent=f.date; meta.appendChild(d); }
    (f.tags||[]).forEach(function(tg){ const s=document.createElement('span'); s.className='tag'; s.textContent=tg; meta.appendChild(s); });
    if(f.fork){
      const parent=FIDDLES.find(x=>x.framework===f.framework&&x.name===f.fork);
      if(parent){
        const a=document.createElement('a'); a.href='#'+f.framework+'/'+f.fork;
        a.textContent='↳ forked from '+(parent.title||humanize(parent.friendly));
        a.onclick=function(e){ e.preventDefault(); open(parent, document.querySelector('.item[data-key="'+f.framework+'/'+f.fork+'"]')); };
        meta.appendChild(a);
      }
    }
    if(f.pen){ const a=document.createElement('a'); a.href=f.pen; a.target='_blank'; a.rel='noopener'; a.textContent='pen ↗'; meta.appendChild(a); }
    if(meta.children.length) info.appendChild(meta);
    info.style.display='block';
  }
  let current = null, codeOn = false;
  function setView(showCode){
    codeOn = showCode;
    code.style.display = showCode ? 'flex' : 'none';
    frame.style.display = showCode ? 'none' : 'block';
    codeBtn.textContent = showCode ? '▶ preview' : '</> source';
  }
  // Mobile drawer: ☰ toggles the sidebar; picking a fiddle closes it.
  function toggleNav(force){ document.body.classList.toggle('nav-open', force); }
  function open(f, el){
    current = f;
    toggleNav(false);
    document.querySelectorAll('.item.active').forEach(e=>e.classList.remove('active'));
    if(el){ el.classList.add('active'); const g=el.closest('.fw-group'); if(g) g.classList.add('open'); el.scrollIntoView({block:'nearest'}); }
    empty.style.display='none'; stage.style.display='block';
    cur.textContent = f.framework + ' / ' + (f.title || humanize(f.friendly));
    renderInfo(f);
    if(f.live !== false){
      setView(false); frame.src=f.url;                 // land on the live demo
      pop.style.display='inline'; pop.href=f.url;
      codeBtn.style.display = (f.files && f.files.length) ? 'inline' : 'none';
    } else {
      frame.src='about:blank';                          // no runnable demo — source only
      setView(true); loadCode(f);
      pop.style.display='none';
      codeBtn.style.display='none';                     // nothing to toggle back to
    }
    location.hash = f.framework + '/' + f.name;
  }
  function toggleCode(){ if(current){ setView(!codeOn); if(codeOn) loadCode(current); } }
  function loadCode(f, startFile){
    const base = f.url.replace(/[^/]*$/, '');
    const files = (f.files && f.files.length) ? f.files : ['index.html'];
    const start = Math.max(0, files.indexOf(startFile)); // e.g. the "… readme" link opens on the README tab
    tabs.innerHTML=''; src.textContent='loading…';
    files.forEach((fp,i)=>{
      const t=document.createElement('button'); t.className='tab'+(i===start?' active':''); t.textContent=fp;
      t.onclick=()=>{ tabs.querySelectorAll('.tab.active').forEach(x=>x.classList.remove('active')); t.classList.add('active'); fetchFile(base+fp); };
      tabs.appendChild(t);
    });
    fetchFile(base+files[start]);
  }
  async function fetchFile(url){
    try{ const r=await fetch(url); src.textContent = r.ok ? await r.text() : '// '+r.status+' — '+url; }
    catch(e){ src.textContent='// could not load '+url; }
    src.scrollTop=0;
  }
  function itemEl(f){
    const it=document.createElement('div'); it.className='item'; it.dataset.key=f.framework+'/'+f.name;
    const isFav = (f.framework+'/'+f.name) === FAVORITE;
    const star = isFav ? '<span title="landing fiddle" style="margin-left:auto;color:var(--phos);font-size:11px;text-shadow:0 0 6px rgba(51,255,51,.6)">★</span>' : '';
    const tag = (!isFav && f.live===false) ? '<span style="margin-left:auto;color:var(--muted);font-size:9.5px;letter-spacing:.05em">src</span>' : '';
    it.innerHTML='<div class="thumb"'+(f.thumb?' style="background-image:url('+f.thumb+')"':'')+'></div><div class="lbl"></div>'+star+tag;
    it.querySelector('.lbl').textContent = f.title || humanize(f.friendly); // textContent: titles come from READMEs
    if(f.desc) it.title = f.desc; // hover tooltip answers "what is this?" before opening
    it.onclick=()=>open(f,it); return it;
  }
  function render(filter=''){
    filter = filter.trim().toLowerCase();
    const byFw = {};
    // A filter that IS a framework name (the site's #three/#vue chips land here via
    // landOnFramework) means that framework exactly — not every fiddle whose
    // description mentions it.
    const exactFw = filter && FIDDLES.some(f=>f.framework.toLowerCase()===filter);
    for(const f of FIDDLES){
      if(exactFw){ if(f.framework.toLowerCase()!==filter) continue; }
      // Otherwise search the README-derived metadata too: title, description, tags —
      // so "tooltip", "webgl", "tween" find fiddles whose dir name never says so.
      else if(filter && !(f.framework+' '+f.friendly+' '+humanize(f.friendly)+' '+(f.title||'')+' '+(f.desc||'')+' '+((f.tags||[]).join(' '))).toLowerCase().includes(filter)) continue;
      (byFw[f.framework] ||= []).push(f);
    }
    nav.innerHTML='';
    const fws = Object.keys(byFw).sort();
    for(const fw of fws){
      const grp=document.createElement('div'); grp.className='fw-group';
      if(filter || fws.length===1) grp.classList.add('open'); // auto-expand when searching
      const h=document.createElement('div'); h.className='fw-header';
      h.innerHTML='<span><span class="chev">▶</span> '+fw+'</span><span class="cnt">'+byFw[fw].length+'</span>';
      h.onclick=()=>grp.classList.toggle('open');
      grp.appendChild(h);
      const box=document.createElement('div'); box.className='fw-items';
      for(const f of byFw[fw]) box.appendChild(itemEl(f));
      grp.appendChild(box); nav.appendChild(grp);
    }
  }
  render();
  // Land on: (1) a deep-linked fiddle if the URL has a hash, else (2) the developer's
  // favorite fiddle, else (3) the "select a fiddle" prompt. Both routes reuse open().
  function landOn(fw, name){
    const f=FIDDLES.find(x=>x.framework===fw&&x.name===name);
    if(f) open(f, [...document.querySelectorAll('.item')].find(e=>e.dataset.key===fw+'/'+name));
    return !!f;
  }
  // Framework-only hash (e.g. #three, deep-linked from the site's "Earlier explorations"):
  // filter the sidebar to that framework and open its landing fiddle — the favorite if it
  // lives in that framework, else the first live one.
  function landOnFramework(fw){
    const box=document.querySelector('.search'); if(box) box.value=fw;
    render(fw);
    const favInFw = (FAVORITE && FAVORITE.split('/')[0]===fw) ? FIDDLES.find(x=>x.framework+'/'+x.name===FAVORITE) : null;
    const pick = favInFw || FIDDLES.find(x=>x.framework===fw && x.live!==false) || FIDDLES.find(x=>x.framework===fw);
    if(pick) open(pick, [...document.querySelectorAll('.item')].find(e=>e.dataset.key===pick.framework+'/'+pick.name));
    return !!pick;
  }
  const hash = location.hash.slice(1);
  if(hash.includes('/')){
    const [fw,name]=hash.split('/'); landOn(fw,name);
  } else if(hash){
    landOnFramework(hash);
  } else if(FAVORITE){
    const [fw,name]=FAVORITE.split('/'); landOn(fw,name);
  }
</script>
